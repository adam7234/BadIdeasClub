<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/main.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top" data-bs-theme="dark">
    <div class="container">
      <a class="navbar-brand d-flex flex-column lh-sm" href="{{ site.baseurl }}/">
        <span class="fw-semibold">Bad Ideas Club</span>
        <small class="text-secondary">Creative work for people trying to change things</small>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMain"
        aria-controls="navMain"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/about">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/projects">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/work">Work</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ site.baseurl }}/join">Join</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary ms-lg-2" href="{{ site.baseurl }}/contact">Start Something</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
