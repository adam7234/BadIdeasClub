    <div class="row justify-content-center">
      <div class="col-lg-8">
        <header class="mb-5">
          <h1 class="display-4 fw-bold">{{ page.title }}</h1>
          <hr class="opacity-10" style="width: 50px; height: 3px; background-color: var(--accent);">

          {{ content }}

      </div>
    </div>
  </div>
</article>
